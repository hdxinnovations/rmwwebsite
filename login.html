<!DOCTYPE html>
<html>
<head>
<title>RMW ERP Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at 20% 20%, rgba(249,115,22,0.08), transparent 40%),
linear-gradient(180deg,#111827,#1e293b);

color:white;
}

/* Login Box */

.login-box{
width:350px;
padding:40px;
background:#1e293b;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
text-align:center;
}

.login-box h2{
margin-bottom:25px;
color:#f97316;
}

/* Inputs */

.input-group{
margin-bottom:20px;
text-align:left;
position:relative;
}

.input-group label{
font-size:14px;
}

.input-group input{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:5px;
outline:none;
background:#111827;
color:white;
}

/* Show password icon */

.toggle-password{
position:absolute;
right:10px;
top:36px;
cursor:pointer;
font-size:14px;
color:#cbd5e1;
}

/* Button */

.login-btn{
width:100%;
padding:12px;
background:#f97316;
border:none;
border-radius:5px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#ea580c;
}

/* Error */

#error{
color:#ef4444;
margin-top:15px;
font-size:14px;
display:none;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
text-decoration:none;
color:white;
background:#f97316;
padding:8px 14px;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

.back-btn:hover{
background:#ea580c;
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back</a>

<div class="login-box">

<h2>RMW ERP Login</h2>

<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter username">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">

<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>

<button class="login-btn" onclick="login()">Login</button>

<p id="error">Invalid Username or Password</p>

</div>


<script>

/* Login Function */

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username==="raja" && password==="raja"){

window.location.href="rmwerp.html";

}
else{

document.getElementById("error").style.display="block";

}

}

/* ENTER KEY LOGIN */

document.addEventListener("keydown",function(event){

if(event.key==="Enter"){
login();
}

});

/* SHOW / HIDE PASSWORD */

function togglePassword(){

let passwordField=document.getElementById("password");

if(passwordField.type==="password"){
passwordField.type="text";
}
else{
passwordField.type="password";
}

}

</script>

</body>
</html>
