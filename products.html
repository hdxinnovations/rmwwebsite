<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - RMW ERP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial;}

body{
background:#0b0f19;
color:#fff;
display:flex;
min-height:100vh;
}

/* SIDEBAR (same as home) */
.sidebar{
width:240px;
background:#111827;
padding:20px;
}

.sidebar h3{margin-bottom:20px}

.sidebar a{
display:block;
color:#ccc;
padding:12px;
text-decoration:none;
border-radius:6px;
margin-bottom:6px;
}
.sidebar a:hover{background:#1f2937;color:#fff}

/* MAIN */
.main{
flex:1;
padding:25px;
}

h1{margin-bottom:20px}

/* FORM */
.form{
background:#111827;
padding:20px;
border-radius:8px;
margin-bottom:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

input{
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{background:#16a34a;color:#fff}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#111827;
border-radius:8px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #222;
text-align:left;
font-size:14px;
}

.actions button{
margin-right:5px;
}

.edit{background:#2563eb;color:#fff}
.delete{background:#dc2626;color:#fff}

/* MOBILE */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{width:100%;display:flex;overflow:auto}
}
</style>
</head>

<body>

<div class="sidebar">
<h3>RMW ERP</h3>
<a href="rmwerp.html">Dashboard</a>
<a href="invoice-portal.html">Billing</a>
<a href="index3.html">Delivery Challan</a>
<!-- <a href="erp.html">ERP Panel</a>
 <a href="#">Reports</a> -->
<a href="products.html">Products</a>
<a href="customers.html">Customers</a>
<a href="expenses.html">Personal Expenses</a>
<a href="product-buying.html">Product Expenses</a>
<a href="employees.html">Employees Page</a>
</div>

<div class="main">
<h1>Product Management</h1>

<!-- ADD PRODUCT -->
<div class="form">
<input id="company" placeholder="Company Name">
<input id="name" placeholder="Product Name">
<input id="code" placeholder="Product Code">
<input id="price" type="number" placeholder="Price per piece">
<input id="qty" type="number" placeholder="Quantity">

<button class="add" onclick="addProduct()">Add Product</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Company</th>
<th>Product</th>
<th>Code</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody id="productTable"></tbody>
</table>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")||"[]");

function save(){
localStorage.setItem("products",JSON.stringify(products));
render();
}

function addProduct(){

const company=document.getElementById("company").value;
const name=document.getElementById("name").value;
const code=document.getElementById("code").value;
const price=parseFloat(document.getElementById("price").value);
const qty=parseFloat(document.getElementById("qty").value);

if(!company) return alert("Enter company name");
if(!name) return alert("Enter product name");
if(!price || !qty) return alert("Enter price & quantity");

const total = price * qty;

products.push({
company,
name,
code,
price,
qty,
total
});

save();

document.getElementById("company").value="";
document.getElementById("name").value="";
document.getElementById("code").value="";
document.getElementById("price").value="";
document.getElementById("qty").value="";
}

function del(i){
if(confirm("Delete product?")){
products.splice(i,1);
save();
}
}

function edit(i){
const p=products[i];

document.getElementById("company").value=p.company;
document.getElementById("name").value=p.name;
document.getElementById("code").value=p.code;
document.getElementById("price").value=p.price;
document.getElementById("qty").value=p.qty;

products.splice(i,1);
save();
}

function render(){

let html="";

products.forEach((p,i)=>{

html+=`
<tr>
<td>${p.company}</td>
<td>${p.name}</td>
<td>${p.code}</td>
<td>₹${p.price}</td>
<td>${p.qty}</td>
<td>₹${p.total}</td>
<td class="actions">
<button class="edit" onclick="edit(${i})">Edit</button>
<button class="delete" onclick="del(${i})">Delete</button>
</td>
</tr>
`;

});

document.getElementById("productTable").innerHTML=html;
}

render();
</script>

</body>
</html>
